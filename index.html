<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enji | Tabbed Portfolio</title>
  <link rel="icon" href="https://files.catbox.moe/y4ejg2.jpeg">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="floating-nav">
    <button class="nav-btn active" data-target="home">Home</button>
    <button class="nav-btn" data-target="works">Works</button>
    <button class="nav-btn" data-target="stack">Stack</button>
    <button class="nav-btn" data-target="journey">Journey</button>
  </nav>

  <div class="container">
    <div id="home" class="tab-content active">...</div>
    <div id="works" class="tab-content">...</div>
    <div id="stack" class="tab-content">...</div>
    <div id="journey" class="tab-content">...</div>
  </div>

  <script src="script.js"></script>
</body>
</html>
